services:
  - type: web
    name: koop-school
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true # Render will generate a random key, but for Laravel it should be base64:32bytes. User can also manually provide a secure Laravel key.
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false # Set this in Render dashboard (e.g. db.aozubsvfcflmutlicrzo.supabase.co)
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false # Set this in Render dashboard (e.g. postgres)
      - key: DB_USERNAME
        sync: false # Set this in Render dashboard (e.g. postgres)
      - key: DB_PASSWORD
        sync: false # Set this in Render dashboard
      - key: DB_SSLMODE
        value: require
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
